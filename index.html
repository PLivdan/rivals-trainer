<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rivals Trainer — cooldowns & team-ups</title>
<style>
  :root{
    --bg:#0d1120; --bg2:#141a2e; --panel:#1a2138; --panel2:#232c48;
    --line:#2c3654; --text:#e9edf8; --mut:#939dbf; --gold:#ffcf3f;
    --van:#4f9fff; --due:#ff5d6c; --str:#46d6a6; --good:#39d98a; --bad:#ff5566;
    --icon:#bcd6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#1b2340,transparent),var(--bg);
    color:var(--text);font:15px/1.5 "Segoe UI",system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--gold)}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0d1120,#0d1120e8);
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
  .bar{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 18px}
  .logo{font-weight:800;letter-spacing:.5px;font-size:19px;text-transform:uppercase;font-style:italic}
  .logo b{color:var(--gold)}
  nav{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);font-weight:700;
    text-transform:uppercase;letter-spacing:.4px;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer}
  nav button:hover{color:var(--text)}
  nav button.on{background:var(--panel2);color:var(--gold);border-color:var(--line)}
  main{max-width:1120px;margin:0 auto;padding:22px 18px 80px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  input[type=search],select{background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:9px 12px;border-radius:9px;font-size:14px;outline:none}
  input[type=search]{flex:1;min-width:200px}
  input:focus,select:focus{border-color:var(--gold)}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--mut);padding:6px 12px;border-radius:20px;
    cursor:pointer;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .chip.on{color:#101425;border-color:transparent}
  .chip.on[data-r=all]{background:var(--gold)}
  .chip.on[data-r=Vanguard]{background:var(--van)} .chip.on[data-r=Duelist]{background:var(--due)}
  .chip.on[data-r=Strategist]{background:var(--str)}
  /* browse grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:14px;overflow:hidden;cursor:pointer;transition:.12s;position:relative}
  .card:hover{transform:translateY(-3px);border-color:var(--gold)}
  .card .pic{height:120px;background:#0a0e1a center/cover no-repeat;display:flex;align-items:flex-end}
  .card .pic img{width:100%;height:100%;object-fit:cover;object-position:left center}
  .card .meta{padding:9px 11px}
  .card .nm{font-weight:800;font-size:13.5px;text-transform:uppercase;line-height:1.15}
  .role{display:inline-block;margin-top:5px;font-size:10.5px;font-weight:800;text-transform:uppercase;
    letter-spacing:.5px;padding:2px 8px;border-radius:20px}
  .role.Vanguard{background:#173154;color:var(--van)} .role.Duelist{background:#4a1b23;color:var(--due)}
  .role.Strategist{background:#123c31;color:var(--str)}
  /* detail overlay */
  .ov{position:fixed;inset:0;background:#05070ccc;display:none;z-index:40;overflow:auto}
  .ov.show{display:block}
  .sheet{max-width:820px;margin:40px auto;background:var(--bg2);border:1px solid var(--line);border-radius:16px}
  .sheet .hd{display:flex;gap:16px;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg2);border-radius:16px 16px 0 0}
  .sheet .hd img{width:64px;height:64px;object-fit:cover;object-position:top center;border-radius:10px;background:#0a0e1a}
  .sheet h2{margin:0;font-size:22px;text-transform:uppercase;font-style:italic}
  .x{margin-left:auto;font-size:26px;color:var(--mut);cursor:pointer;background:none;border:none}
  .sec{padding:16px 20px}
  .sec h3{margin:0 0 12px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
  .ab{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .ab img{width:46px;height:46px;object-fit:contain;background:var(--icon);border-radius:9px;padding:4px;flex:none}
  .ab .t{flex:1;min-width:0}
  .kbd{display:inline-block;min-width:20px;text-align:center;background:#0c1120;border:1px solid var(--line);
    border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;font-weight:800;color:var(--gold)}
  .abnm{font-weight:800;text-transform:uppercase;font-size:13.5px}
  .abd{color:var(--mut);font-size:12.8px;margin-top:3px}
  .chips{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
  .stat{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;line-height:1.4}
  .stat.cd{background:#2a2013;color:var(--gold);border:1px solid #4d3c17}
  .stat.dmg{background:#3a1620;color:#ff9aa6;border:1px solid #5c2230}
  .stat.heal{background:#12331f;color:#7fe6ad;border:1px solid #1f5236}
  .stat.dur{background:#161f3c;color:#9db8ff;border:1px solid #26325c}
  .tu{border-top:1px solid var(--line);padding:12px 0}
  .tu .top{display:flex;gap:10px;align-items:center}
  .tu .tico{width:40px;height:40px;object-fit:contain;background:var(--icon);border-radius:8px;padding:3px;flex:none}
  .tu .pico{width:30px;height:30px;border-radius:50%;object-fit:cover;object-position:top center;
    border:2px solid var(--gold);background:var(--panel2);flex:none}
  .tu .pn{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mut);text-align:right}
  .tu .pn b{color:var(--gold);text-transform:uppercase;letter-spacing:.3px}
  .eff{font-size:12.8px;margin-top:6px}.eff b{color:var(--str)} .eff .e{color:var(--gold)}
  /* quiz */
  .quizwrap{max-width:640px;margin:0 auto}
  .score{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 15px;font-weight:800;font-size:13px}
  .pill b{color:var(--gold)} .pill .s{color:var(--good)}
  .qcard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:18px;padding:26px 22px;text-align:center}
  .qcard .qi{width:96px;height:96px;object-fit:contain;background:var(--icon);border-radius:14px;padding:8px;margin:0 auto}
  .qhero{color:var(--mut);text-transform:uppercase;letter-spacing:1px;font-size:12px;margin-top:14px}
  .qname{font-size:22px;font-weight:800;text-transform:uppercase;font-style:italic;margin:2px 0 4px}
  .qask{color:var(--mut);font-size:14px;margin-bottom:18px}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{background:var(--panel2);border:1px solid var(--line);color:var(--text);font-weight:800;font-size:16px;
    padding:15px;border-radius:12px;cursor:pointer;transition:.1s}
  .opt:hover{border-color:var(--gold)}
  .opt.correct{background:#12402c;border-color:var(--good);color:#b6f5d3}
  .opt.wrong{background:#411a20;border-color:var(--bad);color:#ffb8c0}
  .opt:disabled{cursor:default}
  .opt.face{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 6px}
  .opt.face img{width:58px;height:58px;border-radius:50%;object-fit:cover;object-position:top center;
    border:2px solid var(--line);background:var(--panel)}
  .opt.face .nm{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;line-height:1.15}
  .opts.effs{grid-template-columns:1fr}
  .opt.eff-opt{text-align:left;font-size:12.5px;font-weight:600;line-height:1.45;text-transform:none;padding:12px 14px}
  .tufaces{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
  .tufaces .pico{width:64px;height:64px;border-radius:50%;object-fit:cover;object-position:top center;
    border:2px solid var(--gold);background:var(--panel2)}
  .tufaces .plus{font-size:24px;color:var(--mut);font-weight:800}
  .reveal{margin-top:16px;padding:14px;background:#0c1120;border:1px solid var(--line);border-radius:12px;
    font-size:13px;color:var(--mut);text-align:left;display:none}
  .reveal.show{display:block}
  .reveal b{color:var(--text)}
  .next{margin-top:16px;background:var(--gold);color:#101425;border:none;font-weight:800;text-transform:uppercase;
    letter-spacing:.5px;padding:13px 26px;border-radius:11px;cursor:pointer;font-size:14px;display:none}
  .next.show{display:inline-block}
  .subtabs{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
  .subtabs button{background:var(--panel);border:1px solid var(--line);color:var(--mut);font-weight:700;
    padding:7px 16px;border-radius:9px;cursor:pointer;text-transform:uppercase;font-size:12.5px}
  .subtabs button.on{color:var(--gold);border-color:var(--gold)}
  .muted{color:var(--mut)} .hide{display:none!important}
  .tulist .tu{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:12px 14px}
  .tulist h4{margin:22px 0 8px;text-transform:uppercase;font-size:13px;letter-spacing:.5px;color:var(--mut)}
  footer{max-width:1120px;margin:0 auto;padding:0 18px 40px;color:var(--mut);font-size:12px}
</style>
</head>
<body>
<header><div class="bar">
  <div class="logo">RIVALS <b>TRAINER</b></div>
  <nav>
    <button data-v="browse" class="on">Browse</button>
    <button data-v="cooldowns">Cooldown Quiz</button>
    <button data-v="teamups">Team-Ups</button>
  </nav>
</div></header>

<main>
  <!-- BROWSE -->
  <section id="v-browse">
    <div class="controls">
      <input id="q" type="search" placeholder="Search heroes…" autocomplete="off">
      <span class="chip on" data-r="all">All</span>
      <span class="chip" data-r="Vanguard">Vanguard</span>
      <span class="chip" data-r="Duelist">Duelist</span>
      <span class="chip" data-r="Strategist">Strategist</span>
    </div>
    <div id="grid" class="grid"></div>
  </section>

  <!-- COOLDOWN QUIZ -->
  <section id="v-cooldowns" class="hide">
    <div class="controls" style="justify-content:center">
      <select id="cdscope"></select>
      <button class="chip on" id="cdrestart" style="color:var(--gold)">↻ Restart</button>
    </div>
    <div class="quizwrap">
      <div class="score">
        <span class="pill">Score <b id="cdscore">0</b>/<span id="cdtot">0</span></span>
        <span class="pill">Streak <span class="s" id="cdstreak">0</span></span>
        <span class="pill">Best <b id="cdbest">0</b></span>
      </div>
      <div id="cdq" class="qcard"></div>
    </div>
  </section>

  <!-- TEAM-UPS -->
  <section id="v-teamups" class="hide">
    <div class="subtabs">
      <button data-t="learn" class="on">Learn</button>
      <button data-t="quiz">Quiz</button>
    </div>
    <div id="tulearn"></div>
    <div id="tuquiz" class="quizwrap hide">
      <div class="score">
        <span class="pill">Score <b id="tuscore">0</b>/<span id="tutot">0</span></span>
        <span class="pill">Streak <span class="s" id="tustreak">0</span></span>
      </div>
      <div id="tuq" class="qcard"></div>
    </div>
  </section>
</main>

<div id="ov" class="ov"><div class="sheet" id="sheet"></div></div>
<footer>Rough sketch · data scraped from the official Marvel Rivals hero dossier · icons © NetEase/Marvel</footer>

<script>
const S={heroes:[],role:'all',q:''};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
const cdLabel=n=>n+'s';
const firstInt=s=>{const m=(s||'').match(/\d+/);return m?+m[0]:null;};

fetch('site_data.json').then(r=>r.json()).then(d=>{S.heroes=d.heroes;init()});

function init(){
  $$('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
  $('#q').oninput=e=>{S.q=e.target.value.toLowerCase();renderGrid()};
  $$('.chip[data-r]').forEach(c=>c.onclick=()=>{S.role=c.dataset.r;
    $$('.chip[data-r]').forEach(x=>x.classList.toggle('on',x===c));renderGrid()});
  $('#ov').onclick=e=>{if(e.target.id==='ov')closeSheet()};
  const cdN=[...S.heroes.flatMap(h=>h.abilities.filter(a=>a.cd).map(a=>a.cd)),
             ...S.heroes.flatMap(h=>h.teamups.filter(t=>t.cd).map(t=>t.cd))];
  S.allCds=[...new Set(cdN)].sort((a,b)=>a-b);
  const dmgN=[...S.heroes.flatMap(h=>h.abilities.map(a=>firstInt(a.dmg))),
              ...S.heroes.flatMap(h=>h.teamups.map(t=>firstInt(t.dmg)))].filter(Boolean);
  S.allDmg=[...new Set(dmgN)].sort((a,b)=>a-b);
  S.allDur=[...new Set(S.heroes.flatMap(h=>h.abilities.map(a=>firstInt(a.dur))).filter(Boolean))].sort((a,b)=>a-b);
  S.bySlug=Object.fromEntries(S.heroes.map(h=>[h.slug,h]));
  buildScope(); renderGrid(); newCd(); renderTuLearn();
  $('#cdrestart').onclick=()=>{cd.score=0;cd.tot=0;cd.streak=0;cd.best=0;syncCd();newCd()};
  $('#cdscope').onchange=()=>{cd.score=0;cd.tot=0;cd.streak=0;syncCd();newCd()};
  $$('.subtabs button').forEach(b=>b.onclick=()=>{
    $$('.subtabs button').forEach(x=>x.classList.toggle('on',x===b));
    const quiz=b.dataset.t==='quiz';
    $('#tuquiz').classList.toggle('hide',!quiz); $('#tulearn').classList.toggle('hide',quiz);
    if(quiz&&!tu.q)newTu();
  });
}
function show(v){$$('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  ['browse','cooldowns','teamups'].forEach(x=>$('#v-'+x).classList.toggle('hide',x!==v))}

/* ---------- BROWSE ---------- */
function renderGrid(){
  const g=$('#grid');
  const hs=S.heroes.filter(h=>(S.role==='all'||h.role.includes(S.role))&&h.name.toLowerCase().includes(S.q));
  g.innerHTML=hs.map(h=>{
    const role=(h.role.split(' ')[0]);
    return `<div class="card" onclick="openSheet('${h.slug}')">
      <div class="pic">${h.thumb?`<img src="${h.thumb}" loading="lazy" alt="">`:''}</div>
      <div class="meta"><div class="nm">${esc(h.name)}</div>
      <span class="role ${role}">${esc(h.role)}</span></div></div>`;
  }).join('')||'<p class="muted">No heroes match.</p>';
}
function abChips(a){
  return [
    a.cd?`<span class="stat cd" title="${esc(a.cd_text||'')}">⟳ ${cdLabel(a.cd)}${a.charge?'✦':''}</span>`:'',
    a.dmg?`<span class="stat dmg">⚔ ${esc(a.dmg)}</span>`:'',
    a.heal?`<span class="stat heal">✚ ${esc(a.heal)}</span>`:'',
    a.dur?`<span class="stat dur">⏱ ${esc(a.dur)}</span>`:'',
  ].join('');
}
function tuPartner(t){
  if(!t.partner)return '';
  const ic=t.partner_icon?`<img class="pico" src="${t.partner_icon}" alt="">`:'';
  return `<span class="pn">${ic}<b>${esc(t.partner)}</b></span>`;
}
function tuRow(t){
  return `<div class="tu"><div class="top">
      ${t.icon?`<img class="tico" src="${t.icon}" alt="">`:''}<span class="abnm">${esc(t.name)}</span>
      ${tuPartner(t)}</div>
      <div class="eff"><b>Base:</b> ${esc(t.base)}</div>
      ${t.enhanced?`<div class="eff"><span class="e">Enhanced:</span> ${esc(t.enhanced)}</div>`:''}</div>`;
}
function openSheet(slug){
  const h=S.heroes.find(x=>x.slug===slug); const role=h.role.split(' ')[0];
  const abs=h.abilities.map(a=>{const ch=abChips(a);return `<div class="ab">
      <img src="${a.icon}" alt="">
      <div class="t"><div><span class="kbd">${esc(a.key||'—')}</span> <span class="abnm">${esc(a.name)}</span></div>
        <div class="abd">${esc(a.desc)}</div>
        ${ch?`<div class="chips">${ch}</div>`:''}</div></div>`;}).join('');
  const tus=h.teamups.map(tuRow).join('');
  const rec=h.received.map(t=>`<div class="tu"><div class="top">
      ${t.icon?`<img class="tico" src="${t.icon}" alt="">`:''}<span class="abnm">${esc(t.name)}</span></div>
      <div class="eff muted">${esc(t.desc)}</div></div>`).join('');
  $('#sheet').innerHTML=`<div class="hd">${(h.icon||h.thumb)?`<img src="${h.icon||h.thumb}">`:''}
      <div><h2>${esc(h.name)}</h2><span class="role ${role}">${esc(h.role)}</span>
      ${h.health?`<span class="muted" style="margin-left:8px">❤ ${esc(h.health)}</span>`:''}</div>
      <button class="x" onclick="closeSheet()">×</button></div>
    <div class="sec"><h3>Abilities</h3>${abs}</div>
    ${tus?`<div class="sec"><h3>Team-Up Abilities</h3>${tus}</div>`:''}
    ${rec?`<div class="sec"><h3>Team-Ups Received</h3>${rec}</div>`:''}`;
  $('#ov').classList.add('show');
}
function closeSheet(){$('#ov').classList.remove('show')}

/* ---------- COOLDOWN QUIZ ---------- */
const cd={score:0,tot:0,streak:0,best:0,q:null};
function nearestOptions(correct,pool){
  const others=[...new Set(pool||[])].filter(v=>v!==correct);
  const below=shuffle(others.filter(v=>v<correct).sort((a,b)=>b-a).slice(0,4));
  const above=shuffle(others.filter(v=>v>correct).sort((a,b)=>a-b).slice(0,4));
  const picks=[];
  if(below.length)picks.push(below.pop());
  if(above.length)picks.push(above.pop());
  const rest=shuffle([...below,...above]);
  while(picks.length<3&&rest.length)picks.push(rest.pop());
  while(picks.length<3&&others.length){const v=rnd(others);if(!picks.includes(v))picks.push(v);}
  return shuffle([correct,...picks]);
}
function heroFaceOptions(correctSlug,excludeSlug){
  const role=S.bySlug[correctSlug].role;
  const pool=S.heroes.map(h=>h.slug).filter(s=>s!==correctSlug&&s!==excludeSlug);
  const picks=shuffle(pool.filter(s=>S.bySlug[s].role===role)).slice(0,2);
  const rest=shuffle(pool.filter(s=>!picks.includes(s)));
  while(picks.length<3&&rest.length)picks.push(rest.pop());
  return shuffle([correctSlug,...picks]);
}
function abScope(){
  const scope=$('#cdscope').value;
  let hs=S.heroes;
  if(scope.startsWith('role:'))hs=hs.filter(h=>h.role.includes(scope.slice(5)));
  else if(scope.startsWith('hero:'))hs=hs.filter(h=>h.slug===scope.slice(5));
  const out=[];
  hs.forEach(h=>h.abilities.forEach(a=>{if(a.icon)out.push({...a,hero:h.name,heroSlug:h.slug})}));
  return out;
}
function buildScope(){
  const sel=$('#cdscope');
  let o='<option value="all">All heroes</option>'+
    '<option value="role:Vanguard">Vanguards</option>'+
    '<option value="role:Duelist">Duelists</option>'+
    '<option value="role:Strategist">Strategists</option>';
  o+=S.heroes.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(h=>`<option value="hero:${h.slug}">${esc(h.name)}</option>`).join('');
  sel.innerHTML=o;
}
function newCd(){
  const all=abScope();
  if(!all.length){$('#cdq').innerHTML='<p class="muted">No abilities in this scope.</p>';return}
  const single=$('#cdscope').value.startsWith('hero:');
  const cds=all.filter(a=>a.cd), durs=all.filter(a=>firstInt(a.dur));
  const bag=[];
  if(cds.length)bag.push('cooldown','cooldown');
  if(durs.length)bag.push('duration');
  if(!single)bag.push('hero');
  const type=bag.length?rnd(bag):'cooldown';
  if(type==='hero')return newCdHero(rnd(all));
  if(type==='duration')return newCdNumeric(rnd(durs),'duration');
  return newCdNumeric(rnd(cds.length?cds:all),'cooldown');
}
function newCdNumeric(a,kind){
  const correct=kind==='cooldown'?a.cd:firstInt(a.dur);
  const opts=nearestOptions(correct,kind==='cooldown'?S.allCds:S.allDur);
  cd.q={mode:kind,a,opts,correctIdx:opts.indexOf(correct)};
  const ask=kind==='cooldown'?'Cooldown of this ability?':'How long does this ability last?';
  $('#cdq').innerHTML=`<img class="qi" src="${a.icon}" alt="">
    <div class="qhero">${esc(a.hero)}</div>
    <div class="qname">${esc(a.name)}</div>
    <div class="qask">${ask}</div>
    <div class="opts">${opts.map((v,i)=>`<button class="opt" onclick="ansCd(${i})">${cdLabel(v)}</button>`).join('')}</div>
    <div class="reveal" id="cdrev"></div>
    <button class="next" id="cdnext" onclick="newCd()">Next →</button>`;
}
function newCdHero(a){
  const opts=heroFaceOptions(a.heroSlug,null);
  cd.q={mode:'hero',a,opts,correctIdx:opts.indexOf(a.heroSlug)};
  $('#cdq').innerHTML=`<img class="qi" src="${a.icon}" alt="">
    <div class="qhero">MYSTERY ABILITY</div>
    <div class="qname">? ? ?</div>
    <div class="qask">Which hero does this ability belong to?</div>
    <div class="opts faces">${opts.map((s,i)=>{const hh=S.bySlug[s];
      return `<button class="opt face" onclick="ansCd(${i})"><img src="${hh.icon}" alt="">
        <span class="nm">${esc(hh.name)}</span></button>`;}).join('')}</div>
    <div class="reveal" id="cdrev"></div>
    <button class="next" id="cdnext" onclick="newCd()">Next →</button>`;
}
function ansCd(i){
  const q=cd.q,a=q.a; cd.tot++; const ok=i===q.correctIdx;
  $$('#cdq .opt').forEach((o,idx)=>{o.disabled=true;
    if(idx===q.correctIdx)o.classList.add('correct');
    else if(idx===i)o.classList.add('wrong');});
  if(ok){cd.score++;cd.streak++;cd.best=Math.max(cd.best,cd.streak)}else cd.streak=0;
  const facts=[];
  if(a.cd_text)facts.push('Cooldown '+a.cd_text);
  if(a.dur)facts.push('Duration '+a.dur);
  if(a.dmg)facts.push('Damage '+a.dmg);
  if(a.heal)facts.push('Healing '+a.heal);
  const rev=$('#cdrev');rev.classList.add('show');
  rev.innerHTML=`<b>${esc(a.hero)} — ${esc(a.name)}</b>`+(facts.length?`<br>${esc(facts.join(' · '))}`:'')+`<br>${esc(a.desc)}`;
  $('#cdnext').classList.add('show'); syncCd();
}
function syncCd(){$('#cdscore').textContent=cd.score;$('#cdtot').textContent=cd.tot;
  $('#cdstreak').textContent=cd.streak;$('#cdbest').textContent=cd.best}

/* ---------- TEAM-UP LEARN ---------- */
function renderTuLearn(){
  const byHero=S.heroes.filter(h=>h.teamups.length).map(h=>
    `<h4>${esc(h.name)}</h4>${h.teamups.map(tuRow).join('')}`).join('');
  $('#tulearn').className='tulist'; $('#tulearn').innerHTML=byHero;
}

/* ---------- TEAM-UP QUIZ ---------- */
const tu={score:0,tot:0,streak:0,q:null};
function tuAllPool(){const o=[];S.heroes.forEach(h=>h.teamups.forEach(t=>{if(t.partner_slug)o.push({...t,heroSlug:h.slug,hero:h.name})}));return o;}
function trimEff(s){return (s||'').replace(/^\s*enhanced effect:\s*/i,'').replace(/^when teaming up\s*(with\s+)?[^,]+,\s*/i,'');}
function tuHead(t){const a=S.bySlug[t.heroSlug],p=S.bySlug[t.partner_slug];
  return `<div class="tufaces">
      <img class="pico" src="${a.icon}" title="${esc(t.hero)}" alt=""><span class="plus">+</span>
      <img class="pico" src="${p.icon}" title="${esc(t.partner)}" alt=""></div>
    <div class="qname">${esc(t.name)}</div>
    <div class="qhero">${esc(t.hero)} + ${esc(t.partner)}</div>`;
}
function newTu(){
  const pool=tuAllPool();
  const t=rnd(pool);
  const dmgN=firstInt(t.dmg), hasEff=t.enhanced&&t.enhanced.length>30;
  let type;
  if(dmgN&&Math.random()<0.4)type='damage';
  else if(t.cd&&Math.random()<0.6)type='cooldown';
  else if(hasEff)type='effect';
  else type=t.cd?'cooldown':(dmgN?'damage':'effect');
  if(type==='effect')return newTuEffect(pool,t);
  const correct=type==='cooldown'?t.cd:dmgN;
  const opts=nearestOptions(correct,type==='cooldown'?S.allCds:S.allDmg);
  const label=type==='cooldown'?cdLabel:(v=>String(v));
  tu.q={mode:type,t,opts,correctIdx:opts.indexOf(correct)};
  const ask=type==='cooldown'?"What's this team-up's cooldown?":"How much damage does this team-up deal?";
  const ctx=hasEff?`<div class="eff" style="text-align:left;margin:8px auto 14px;max-width:470px"><span class="e">Effect:</span> ${esc(trimEff(t.enhanced))}</div>`:'';
  $('#tuq').innerHTML=tuHead(t)+`<div class="qask">${ask}</div>${ctx}
    <div class="opts">${opts.map((v,i)=>`<button class="opt" onclick="ansTu(${i})">${label(v)}</button>`).join('')}</div>
    <div class="reveal" id="turev"></div>
    <button class="next" id="tunext" onclick="newTu()">Next →</button>`;
}
function newTuEffect(pool,t){
  const withEnh=pool.filter(x=>x.enhanced&&x.enhanced.length>30);
  if(!(t.enhanced&&t.enhanced.length>30))t=rnd(withEnh);
  const distract=shuffle(withEnh.filter(x=>x.name!==t.name)).slice(0,3);
  const opts=shuffle([t,...distract]);
  tu.q={mode:'effect',t,opts,correctIdx:opts.indexOf(t)};
  $('#tuq').innerHTML=tuHead(t)+`<div class="qask">What does this team-up's enhanced effect do?</div>
    <div class="opts effs">${opts.map((o,i)=>`<button class="opt eff-opt" onclick="ansTu(${i})">${esc(trimEff(o.enhanced))}</button>`).join('')}</div>
    <div class="reveal" id="turev"></div>
    <button class="next" id="tunext" onclick="newTu()">Next →</button>`;
}
function ansTu(i){
  const q=tu.q,t=q.t; tu.tot++; const ok=i===q.correctIdx;
  $$('#tuq .opt').forEach((o,idx)=>{o.disabled=true;
    if(idx===q.correctIdx)o.classList.add('correct');
    else if(idx===i)o.classList.add('wrong');});
  if(ok){tu.score++;tu.streak++}else{tu.streak=0}
  const facts=[];
  if(t.cd_text)facts.push('Cooldown '+t.cd_text);
  if(t.dmg)facts.push('Damage '+t.dmg);
  if(t.heal)facts.push('Healing '+t.heal);
  $('#turev').classList.add('show');
  $('#turev').innerHTML=`<b>${esc(t.name)}</b> — ${esc(t.hero)} + ${esc(t.partner)}.`+
    (facts.length?`<br>${esc(facts.join(' · '))}`:'')+
    `<br><span class="e">Enhanced:</span> ${esc(t.enhanced||t.base)}`;
  $('#tunext').classList.add('show');
  $('#tuscore').textContent=tu.score;$('#tutot').textContent=tu.tot;$('#tustreak').textContent=tu.streak;
}
</script>
